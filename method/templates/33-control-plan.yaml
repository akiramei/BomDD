bomdd:
  product: <プロジェクト名>
  experiment: <ループID>
  layer: Control Plan

# 深さの梯子(method-v1 §5): unit < L1 存在 < L2 メタデータ < L3 content/signal < G golden+承認者
#   核 = unit(exact, 丸め規定込み)
#   表面 = 外部ツール≥L2 / 同期・座標系=L3 / 知覚=G(golden+許容差+承認者)
#   L0 文字列照合・pixel-exact は既定不採用(例外: 仕様化された正規形のみ)
# 深い段は FMEA で要注意と判定した特性にのみ割当(コスト)

control_plan:
  depth_ladder:
    unit: <この題材での unit 検査の定義>
    L1: <プロセス起動・成果物存在>
    L2: <メタデータ検査(例 OpenAPI JSON / ffprobe)>
    L3: <内容・信号・相互作用(例 HTTP 実打 / 音声相関)>
    G: <人間承認(知覚・ユーザビリティ)>

  characteristics:
    - id: CP-<NAME>-001
      characteristic: <保証する特性(1文)>
      classification: core              # core | surface
      depth: unit                       # unit | L1 | L2 | L3 | G
      tolerance: exact                  # exact | ±N ms | ΔE<N | required nodes present ...
      fixture: <治具(受入ハーネスのパス)>
      oracle: <合否の判定方法(1文)>
      approver: automated               # automated | <人名/役割>(G は人間必須)
      test_vectors:                     # 完全性が要る特性は必須(CHEAT-005: 中間値ベクタ未整備が
        - <境界値>                      #   サイレント乖離を通した。「受入の被覆が捕捉を決める」)
        - <中間値(丸めの分岐点)>
        - <反例(FMEA の故障モード由来)>

    # NFR 特性行の例(candidate — 目標値は E-BOM nfr_targets、実現は M-BOM)
    - id: CP-NFR-001
      characteristic: <例 予約作成 p95 < 200ms @ 100 req/s>
      classification: surface
      depth: L3                         # NFR は原則 execution measurement
      tolerance: <例 p95 ≤ 200ms(計測 3 回の中央値)>
      fixture: <負荷計測スクリプト(治具として repo 管理)>
      oracle: <計測手順と判定(環境条件込みで再現可能に)>
      approver: automated
