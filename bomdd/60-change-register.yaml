# 60-change-register — 方法論リポ(BomDD)ハーネス自己適用台帳
#
# 新設 2026-07-10。起点: メンバーによる外部レビュー(修正前時点・所見6件)—
# 総評「方法論の核は強いが、ハーネス自身の工業化(fail closed・自己検査・版固定)が
# 方法論に追いついていない」への回答として、ハーネス(method/tools・templates)の
# 変更を本台帳で管理する(change-management R1: 起票なき変更の禁止を自己適用)。
#
# 正直記載: 本リポは E/M-BOM 未宣言(stage-0 相当)につき、affected_refs は
# BOM ID でなくパス参照。BOM 宣言の整備は別途判断(過剰形式化を避ける — v2方針)。

changes:
  - id: ECO-001
    title: 配布テンプレ 60-change-register.yaml が YAML として不正(fail-late)
    date: 2026-07-10
    origin: defect
    status: verified
    order_ref: bomdd/60-change-order-eco-001.md
    affected_refs: [method/templates/60-change-register.yaml]
    no_impact_prediction: "templates/60-change-register.yaml の 1 行(25 行目の引用符付加)のみ — 他ファイルは diff ゼロ"
    diff_audit:
      baseline: 4c954f1
      allowed_paths: [method/templates/60-change-register.yaml]
      head: "5174475"  # diff監査済み: 窓内は allowed_paths+台帳系のみ・予測的中
    summary: >
      プレースホルダー内の未引用コロン(「(例: 「Api…」)」)で PyYAML が解釈不能
      (レビュー所見1・14/15 合格を再現)。bomdd-init が必ず配布し /eco-file 等が前提
      とするため、初回 ECO の機械検査(R-051 等)で停止する fail-late 欠陥。
      値を二重引用符で囲んで是正。
    verification: "PyYAML 全数パース 15/15 合格(是正前 14/15・失敗行の再現ログは order 参照)"

  - id: ECO-002
    title: stage0-survey が git 失敗を空の健全データとして返す(fail-open)
    date: 2026-07-10
    origin: defect
    status: verified
    order_ref: bomdd/60-change-order-eco-002.md
    affected_refs: [method/tools/stage0-survey.py]
    no_impact_prediction: "stage0-survey.py 以外は diff ゼロ。正常系の出力 JSON はバイト同一(測定定義 protocol §2 は不変 — 変えたのは欠測の扱いのみ)"
    diff_audit:
      baseline: 4c954f1
      allowed_paths: [method/tools/stage0-survey.py]
      head: "5174475"  # diff監査済み: 窓内は allowed_paths+台帳系のみ・予測的中
    summary: >
      git の returncode 未確認により、存在しないリポでも head 空・コミット 0 件の
      JSON を exit 0 で返していた(レビュー所見4・再現済み)。健診器の欠測は
      「問題なし」でなく「測定不能」— git 失敗・履歴ゼロ・解析可能ファイルゼロを
      exit 2 で停止する fail-closed へ是正(run_git ヘルパ+前提検査+ゼロ件ガード)。
    verification: >
      陽性対照: 存在しないリポ=exit 2・git 外ディレクトリ=exit 2(是正前は exit 0)。
      回帰: 実リポ(--max-commits 100)の出力 JSON が是正前後でバイト同一。詳細は order 参照。
